server {
    listen 80;
    server_name api.cstwy.top;

    client_max_body_size 8m;

    location = /json-tool { return 301 /json-tool/; }
    location /json-tool/ {
        proxy_pass http://127.0.0.1:6666;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /json { return 301 /json/; }
    location /json/ {
        alias /var/www/html/utools-json-formatter/;
        index index.html;
    }

    location = /json-format { return 301 /json-format/; }
    location /json-format/ {
        alias /var/www/html/json-processor/;
        index index.html;
    }

    location = /json-diff { return 301 /json-diff/; }
    location /json-diff/ {
        alias /var/www/html/json-diff/;
        index index.html;
    }

    location = /mcp {
        add_header X-MCP-Proxy 1 always;
        proxy_pass http://127.0.0.1:19000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1:19000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
